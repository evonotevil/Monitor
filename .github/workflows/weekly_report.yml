name: 全球游戏合规周报

on:
  # 每周一 UTC 01:47 = 北京/新加坡时间 09:47
  schedule:
    - cron: '47 1 * * 1'
  # 支持手动触发（Settings → Actions → Run workflow）
  workflow_dispatch:

permissions:
  contents: write   # 允许 CI 提交报告回仓库

jobs:
  generate-and-notify:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码（浅克隆，仅需最新一次 commit；DB 已由当日 daily_check 更新）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Python 环境 ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright

      # ── Playwright 浏览器缓存（命中时安装从 90s 降到 5s）──────────
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium (only if cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Chromium system deps (always, fast if browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # ── 3. 补充抓取本周最新数据（覆盖 daily_check 未运行、手动触发、race condition 等情形）
      #    bulk_upsert 幂等设计，重复运行不会产生重复条目
      - name: Fetch latest data (weekly refresh)
        continue-on-error: true
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python monitor.py run --period week --no-translate

      # ── 4. 翻译未翻译条目（分离翻译步骤，避免 rate limit 超时导致整体失败）
      - name: Translate untranslated items
        continue-on-error: true
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python monitor.py retranslate --limit 60

      # ── 5. 生成 HTML 报告
      - name: Generate HTML report
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python monitor.py report --format html --period week

      # ── 6. 生成 PDF（同时写 latest.html / latest.pdf 和带日期文件名）
      - name: Generate PDF report
        run: python generate_pdf.py

      # ── 7. 计算本次报告的公开 URL ──────────────────────────────────
      - name: Set report URLs
        run: |
          REPO="${{ github.repository }}"
          CACHE_BUST=$(date -u +%Y%m%d%H%M)
          BASE="https://raw.githubusercontent.com/${REPO}/main/reports"
          echo "MOBILE_URL=https://htmlpreview.github.io/?${BASE}/latest-mobile.html?v=${CACHE_BUST}" >> $GITHUB_ENV
          echo "PC_URL=https://htmlpreview.github.io/?${BASE}/latest-pc.html?v=${CACHE_BUST}" >> $GITHUB_ENV
          echo "HTML_URL=https://htmlpreview.github.io/?${BASE}/latest-mobile.html?v=${CACHE_BUST}" >> $GITHUB_ENV
          # PDF 文件名含空格和中文，整块交给 Python 生成并直接写入 GITHUB_ENV
          python -c "
          from datetime import datetime, timedelta
          import urllib.parse, os
          t = datetime.utcnow()
          w = t - timedelta(days=7)
          fn = f'{w.strftime(\"%Y-%m-%d\")} - {t.strftime(\"%Y-%m-%d\")} 周报.pdf'
          base = 'https://raw.githubusercontent.com/${REPO}/main/reports'
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'PDF_FILENAME={fn}\n')
              f.write(f'PDF_URL={base}/{urllib.parse.quote(fn)}\n')
          "

      # ── 8. 先提交并推送报告，再发飞书（确保文件已在仓库中）─────────
      - name: Commit reports back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 计算本周 ISO 周号（如 2026-W10），用于存档目录名
          WEEK_ID=$(date -u +%Y-W%V)
          ARCHIVE_DIR="reports/archive/${WEEK_ID}"
          mkdir -p "${ARCHIVE_DIR}"

          # 将本周 HTML 存入归档（HTML 约 70~150KB，适合文本分析；PDF 太大不归档）
          cp reports/latest-mobile.html "${ARCHIVE_DIR}/weekly-mobile.html"
          cp reports/latest-pc.html     "${ARCHIVE_DIR}/weekly-pc.html"
          # 保留 weekly.html 兼容旧链接（指向移动端）
          cp reports/latest-mobile.html "${ARCHIVE_DIR}/weekly.html"

          # 更新 latest HTML + DB + 本周存档
          git add reports/latest-mobile.html reports/latest-pc.html reports/latest.html data/monitor.db
          git add "reports/${PDF_FILENAME}" 2>/dev/null || true
          git add "${ARCHIVE_DIR}/weekly-mobile.html" "${ARCHIVE_DIR}/weekly-pc.html" "${ARCHIVE_DIR}/weekly.html"

          # 如果没有变化就跳过 commit（避免空提交报错）
          git diff --staged --quiet || \
            git commit -m "📊 周报存档 ${WEEK_ID} $(date -u +%Y-%m-%d) [skip ci]"

          # rebase 后推送，避免并发 push 导致 rejected
          git pull --rebase origin main
          git push

      # ── 9. 发送飞书卡片通知（文件已在仓库，链接可访问）──────────────
      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPORT_MOBILE_URL:  ${{ env.MOBILE_URL }}
          REPORT_PC_URL:      ${{ env.PC_URL }}
          REPORT_HTML_URL:    ${{ env.HTML_URL }}
          REPORT_PDF_URL:     ${{ env.PDF_URL }}
          LLM_API_KEY:        ${{ secrets.LLM_API_KEY }}
        run: python feishu_notify.py
