name: 周数据抓取（写入飞书多维表格）

on:
  # 手动触发（Settings → Actions → Run workflow）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Python 环境 ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. 抓取本周最新数据并写入飞书多维表格（待初筛状态）─────────
      #    bulk_upsert 幂等设计，重复运行不会产生重复条目
      - name: Fetch latest data (weekly refresh)
        continue-on-error: true
        env:
          LLM_API_KEY:                 ${{ secrets.LLM_API_KEY }}
          FEISHU_APP_ID:               ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:           ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_WIKI_TOKEN:   ${{ secrets.FEISHU_BITABLE_WIKI_TOKEN }}
          FEISHU_BITABLE_APP_TOKEN:    ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_TABLE_ID:     ${{ secrets.FEISHU_BITABLE_TABLE_ID }}
        run: python monitor.py run --period week --no-translate

      # ── 4. 翻译未翻译条目 ──────────────────────────────────────────
      - name: Translate untranslated items
        continue-on-error: true
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python monitor.py retranslate --limit 60

      # ── 5. 提交 DB + 多维表格去重记录 ──────────────────────────────
      - name: Commit updated DB and bitable sync state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/monitor.db data/bitable_synced_urls.json 2>/dev/null || true

          git diff --staged --quiet || \
            git commit -m "🔄 每日数据更新 $(date -u +%Y-%m-%d) [skip ci]"

          git pull --rebase origin main
          git push
