name: 全球游戏合规周报

on:
  # 每周一 UTC 01:47 = 北京/新加坡时间 09:47
  schedule:
    - cron: '47 1 * * 1'
  # 支持手动触发（Settings → Actions → Run workflow）
  workflow_dispatch:

permissions:
  contents: write   # 允许 CI 提交报告回仓库

jobs:
  generate-and-notify:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码（含历史 DB + latest 报告）────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 环境 ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps chromium

      # ── 3. 抓取最新数据 & 生成 HTML 报告 ──────────────────────────
      - name: Fetch data & generate HTML
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python monitor.py run --period week
          python monitor.py report --format html --period week

      # ── 4. 生成 PDF（同时写 latest.html / latest.pdf 和带日期文件名）
      - name: Generate PDF report
        run: python generate_pdf.py

      # ── 5. 计算本次报告的公开 URL ──────────────────────────────────
      - name: Set report URLs
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"
          BASE="https://raw.githubusercontent.com/${REPO}/${BRANCH}/reports"
          # 带日期的 PDF 文件名（与 generate_pdf.py 保持一致）
          PDF_DATE=$(python -c "from datetime import datetime; print(datetime.now().strftime('%d-%m-%Y'))")
          PDF_FILENAME="Lilith-Legal-Compliance-Report-${PDF_DATE}.pdf"
          echo "HTML_URL=https://htmlpreview.github.io/?${BASE}/latest.html" >> $GITHUB_ENV
          echo "PDF_URL=${BASE}/${PDF_FILENAME}" >> $GITHUB_ENV
          echo "PDF_FILENAME=${PDF_FILENAME}" >> $GITHUB_ENV

      # ── 6. 先提交并推送报告，再发飞书（确保文件已在仓库中）─────────
      - name: Commit reports back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 清理上周的带日期 PDF（只保留本周的）
          git ls-files "reports/Lilith-Legal-Compliance-Report-*.pdf" \
            | grep -v "${{ env.PDF_FILENAME }}" \
            | xargs -r git rm --cached
          git add reports/latest.html reports/latest.pdf data/monitor.db
          # 添加本周带日期的 PDF（如果存在）
          [ -f "reports/${{ env.PDF_FILENAME }}" ] && git add "reports/${{ env.PDF_FILENAME }}" || true
          # 如果没有变化就跳过 commit（避免空提交报错）
          git diff --staged --quiet || \
            git commit -m "📊 周报 $(date -u +%Y-%m-%d) [skip ci]"
          git push

      # ── 7. 发送飞书卡片通知（文件已在仓库，链接可访问）──────────────
      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPORT_HTML_URL:    ${{ env.HTML_URL }}
          REPORT_PDF_URL:     ${{ env.PDF_URL }}
        run: python feishu_notify.py
